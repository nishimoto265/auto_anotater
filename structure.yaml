      機能:
      - PyQt6アプリケーションの初期化
      - メインウィンドウの起動と表示
      - 起動オプションの処理（動画から/フレームから/途中から）
      - システムリソースの初期化
      - グローバル設定の読み込み
      - 例外ハンドリングとログ設定
      
      実装内容:
      - QApplicationの作成と設定
      - メインウィンドウの生成
      - コマンドライン引数の解析
      - 初期化処理の実行
      - アプリケーションループの開始
    agent選定理由: claude-3-5-sonnet-20241022はPyQt6のアプリケーション構造に精通しており、メインエントリーポイントの実装に最適です。
    api選定理由: アプリケーション起動部分のため外部APIは不要です。
    dependency: 
      - src/ui/main_window.py
      - src/core/config_manager.py
      - src/utils/logger.py
    agent: claude-3-5-sonnet-20241022
    api: []
    
