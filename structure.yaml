src:
  structure.yaml:
    content: |-
      オートアノテーションアプリのプロジェクト構造定義
      
      本プロジェクトは動画からのフレーム抽出とアノテーション作業を効率化する
      PyQt6ベースのデスクトップアプリケーションです。
      
      主要機能:
      - 4K動画の30fps→5fps変換とフレーム抽出
      - YOLOフォーマットでのアノテーション管理
      - リアルタイムBB操作と追跡機能
      - 64GBメモリを活用した高速キャッシュシステム
      - マルチスレッド設計による高速フレーム移動
      
      技術スタック:
      - フロントエンド: PyQt6
      - 画像処理: OpenCV, Pillow
      - 数値計算: NumPy
      - 追跡: 独自アルゴリズム実装
      
      パフォーマンス目標:
      - フレーム切り替え: 50ms以下
      - 画像表示: 100ms以下
      - BB描画更新: 16ms以下
    agent選定理由: claude-3-5-sonnet-20241022は複雑なデスクトップアプリケーションの設計と実装に適しており、PyQt6の専門知識と高度な推論能力を持っています。
    api選定理由: 内部システム設計のため外部APIは不要です。
    dependency: []
    agent: claude-3-5-sonnet-20241022
    api: []
  
  main.py:
    content: |-
